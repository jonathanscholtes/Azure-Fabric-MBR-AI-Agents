name: CI

on:
  pull_request:
    branches: [main]


jobs:
  lint-python:
    name: Python lint + type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install insights-api deps
        run: pip install apps/insights-api/ ruff

      - name: Ruff — insights-api
        run: ruff check apps/insights-api/src

      - name: Install presentation-tools deps
        run: pip install apps/presentation-tools-mcp/

      - name: Ruff — presentation-tools
        run: ruff check apps/presentation-tools-mcp/src

      - name: Ruff — agents
        run: ruff check agents

  lint-react:
    name: React lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/insights-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/insights-ui/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_BASE_URL: /api

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: terraform init (backend=false)
        run: terraform -chdir=infra init -backend=false

      - name: terraform validate
        run: terraform -chdir=infra validate
