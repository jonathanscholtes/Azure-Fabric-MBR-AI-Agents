name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      skip_infra:
        description: Skip Terraform (infra already exists)
        type: boolean
        default: false
      skip_fabric:
        description: Skip Fabric lakehouse setup
        type: boolean
        default: false
      skip_agents:
        description: Skip Foundry agent deployment
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

jobs:
  # ── Job 0: Detect changed paths ─────────────────────────────────────────────
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      mbr_api:       ${{ steps.filter.outputs.mbr_api }}
      mbr_tools_mcp: ${{ steps.filter.outputs.mbr_tools_mcp }}
      mbr_ui:        ${{ steps.filter.outputs.mbr_ui }}
      agents:        ${{ steps.filter.outputs.agents }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            mbr_api:
              - 'apps/mbr-api/**'
            mbr_tools_mcp:
              - 'apps/mbr-tools-mcp/**'
            mbr_ui:
              - 'apps/mbr-ui/**'
            agents:
              - 'agents/**'

  # ── Job 1: Infrastructure ───────────────────────────────────────────────────
  infra:
    name: Terraform (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    needs: changes
    outputs:
      acr:                   ${{ steps.tfout.outputs.acr }}
      resource_group:        ${{ steps.tfout.outputs.resource_group }}
      foundry_endpoint:      ${{ steps.tfout.outputs.foundry_endpoint }}
      mcp_fqdn:              ${{ steps.tfout.outputs.mcp_fqdn }}
      mbr_api_url:           ${{ steps.tfout.outputs.mbr_api_url }}
      model_deployment:      ${{ steps.tfout.outputs.model_deployment }}
      mini_model_deployment: ${{ steps.tfout.outputs.mini_model_deployment }}
      key_vault_uri:         ${{ steps.tfout.outputs.key_vault_uri }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      - name: Terraform init
        if: ${{ github.event.inputs.skip_infra != 'true' }}
        run: |
          terraform -chdir=infra init \
            -backend-config="resource_group_name=${{ vars.TF_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TF_STATE_SA }}" \
            -backend-config="container_name=tfstate" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.tfstate"

      - name: Terraform apply
        if: ${{ github.event.inputs.skip_infra != 'true' }}
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var="environment=${{ github.event.inputs.environment || 'dev' }}" \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var="tenant_id=${{ vars.AZURE_TENANT_ID }}" \
            -var="fabric_sql_server=${{ vars.FABRIC_SQL_SERVER }}" \
            -var="fabric_sql_database=${{ vars.FABRIC_SQL_DATABASE }}"

      - name: Export Terraform outputs
        id: tfout
        run: |
          ACR=$(terraform -chdir=infra output -raw container_registry_login_server)
          RG=$(terraform -chdir=infra output -raw resource_group_name)
          FOUNDRY=$(terraform -chdir=infra output -raw foundry_project_endpoint)
          MCP=$(terraform -chdir=infra output -raw mcp_tools_api_fqdn)
          MBR_API=$(terraform -chdir=infra output -raw mbr_api_url)
          MODEL=$(terraform -chdir=infra output -raw model_deployment)
          MINI=$(terraform -chdir=infra output -raw mini_model_deployment)
          KV_URI=$(terraform -chdir=infra output -raw key_vault_uri)
          echo "acr=$ACR"                        >> $GITHUB_OUTPUT
          echo "resource_group=$RG"              >> $GITHUB_OUTPUT
          echo "foundry_endpoint=$FOUNDRY"       >> $GITHUB_OUTPUT
          echo "mcp_fqdn=$MCP"                   >> $GITHUB_OUTPUT
          echo "mbr_api_url=$MBR_API"            >> $GITHUB_OUTPUT
          echo "model_deployment=$MODEL"         >> $GITHUB_OUTPUT
          echo "mini_model_deployment=$MINI"     >> $GITHUB_OUTPUT
          echo "key_vault_uri=$KV_URI"           >> $GITHUB_OUTPUT

  # ── Job 2a: Build mbr-api ───────────────────────────────────────────────────
  build-mbr-api:
    name: Build mbr-api
    runs-on: ubuntu-latest
    needs: [changes, infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: needs.changes.outputs.mbr_api == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-api
        run: |
          az acr build \
            --registry $(echo "${{ needs.infra.outputs.acr }}" | cut -d. -f1) \
            --image    mbr-api:${{ github.sha }} \
            --image    mbr-api:latest \
            apps/mbr-api

      - name: Update mbr-api Container App
        run: |
          az containerapp update \
            --name ca-mbr-api \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image ${{ needs.infra.outputs.acr }}/mbr-api:${{ github.sha }} \
            --output none

  # ── Job 2b: Build mbr-tools-mcp ─────────────────────────────────────────────
  build-mbr-tools-mcp:
    name: Build mbr-tools-mcp
    runs-on: ubuntu-latest
    needs: [changes, infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: needs.changes.outputs.mbr_tools_mcp == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-tools-mcp
        run: |
          az acr build \
            --registry $(echo "${{ needs.infra.outputs.acr }}" | cut -d. -f1) \
            --image    mbr-tools-mcp:${{ github.sha }} \
            --image    mbr-tools-mcp:latest \
            apps/mbr-tools-mcp

      - name: Update mbr-tools-mcp Container App
        run: |
          az containerapp update \
            --name ca-mbr-tools-mcp \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image ${{ needs.infra.outputs.acr }}/mbr-tools-mcp:${{ github.sha }} \
            --output none

  # ── Job 2c: Build mbr-ui ────────────────────────────────────────────────────
  build-mbr-ui:
    name: Build mbr-ui
    runs-on: ubuntu-latest
    needs: [changes, infra]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: needs.changes.outputs.mbr_ui == 'true' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build & push mbr-ui
        run: |
          az acr build \
            --registry  $(echo "${{ needs.infra.outputs.acr }}" | cut -d. -f1) \
            --image     mbr-ui:${{ github.sha }} \
            --image     mbr-ui:latest \
            --build-arg VITE_API_BASE_URL=/api \
            apps/mbr-ui

      - name: Update mbr-ui Container App
        run: |
          az containerapp update \
            --name ca-mbr-ui \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --image ${{ needs.infra.outputs.acr }}/mbr-ui:${{ github.sha }} \
            --output none

  # ── Job 3: Fabric (optional, manual only) ───────────────────────────────────
  fabric:
    name: Fabric setup (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.skip_fabric != 'true' &&
      vars.FABRIC_SQL_SERVER != ''

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Fabric dependencies
        run: pip install pyodbc azure-identity

      - name: Create Lakehouse tables
        run: python fabric/scripts/setup_lakehouse.py --sql-server ${{ vars.FABRIC_SQL_SERVER }}

      - name: Seed data
        run: python fabric/scripts/seed_data.py --sql-server ${{ vars.FABRIC_SQL_SERVER }}

  # ── Job 4: Foundry agents ───────────────────────────────────────────────────
  agents:
    name: Foundry agents (${{ github.event.inputs.environment || 'dev' }})
    runs-on: ubuntu-latest
    needs: [changes, infra, build-mbr-api, build-mbr-tools-mcp, build-mbr-ui]
    environment: ${{ github.event.inputs.environment || 'dev' }}
    if: >
      always() && !cancelled() &&
      needs.infra.result == 'success' &&
      needs.infra.outputs.foundry_endpoint != '' &&
      (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_agents != 'true') ||
        (github.event_name == 'push' && needs.changes.outputs.agents == 'true')
      )

    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id:       ${{ vars.AZURE_CLIENT_ID }}
          tenant-id:       ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install agent SDK
        run: pip install -r agents/requirements.txt

      - name: Deploy Foundry agents
        run: |
          python agents/deploy.py \
            --project-endpoint       ${{ needs.infra.outputs.foundry_endpoint }} \
            --model-deployment       ${{ needs.infra.outputs.model_deployment }} \
            --mini-model-deployment  ${{ needs.infra.outputs.mini_model_deployment }} \
            --key-vault-uri          ${{ needs.infra.outputs.key_vault_uri }} \
            --mcp-server-url         https://${{ needs.infra.outputs.mcp_fqdn }}/mcp \
            --output                 agents/agent_ids.json

      - name: Inject agent names into ca-mbr-api
        run: |
          CONV_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'conversational' in k][0])")
          PRES_NAME=$(python -c "import json; d=json.load(open('agents/agent_ids.json')); print([k for k in d if 'presentation' in k][0])")
          az containerapp update \
            --name ca-mbr-api \
            --resource-group ${{ needs.infra.outputs.resource_group }} \
            --set-env-vars "CONVERSATIONAL_AGENT_NAME=$CONV_NAME" "MBR_PRESENTATION_AGENT_NAME=$PRES_NAME" \
            --output none

  # ── Job 5: Smoke test ───────────────────────────────────────────────────────
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: [infra, build-mbr-api, build-mbr-tools-mcp, build-mbr-ui]
    if: always() && !cancelled() && needs.infra.result == 'success'

    steps:
      - name: Health check — mbr-api
        run: |
          curl --fail --retry 5 --retry-delay 10 \
            "${{ needs.infra.outputs.mbr_api_url }}/health"

  # ── Summary ─────────────────────────────────────────────────────────────────
  summary:
    name: Deployment summary
    runs-on: ubuntu-latest
    needs: [infra, build-mbr-api, build-mbr-tools-mcp, build-mbr-ui, agents, smoke-test]
    if: always()

    steps:
      - name: Write summary
        run: |
          echo "### LONGHAUL Deploy — ${{ github.event.inputs.environment || 'dev' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Resource | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| UI | https://$(echo '${{ needs.infra.outputs.mbr_api_url }}' | sed 's|https://||') |" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-api | ${{ needs.infra.outputs.mbr_api_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Foundry | ${{ needs.infra.outputs.foundry_endpoint }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-api | ${{ needs.build-mbr-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-tools-mcp | ${{ needs.build-mbr-tools-mcp.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| mbr-ui | ${{ needs.build-mbr-ui.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| agents | ${{ needs.agents.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY
